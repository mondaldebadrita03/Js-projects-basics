<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Changer</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1 class="main-heading">BACKGROUND CHANGER</h1>
    <div class="theme-container">
        <div class="theme-box pink">
            <span>Pink</span>
            <label class="toggle">
                <input type="radio" name="theme" data-color="#ffd1dc">
                <span class="slider"></span>
            </label>
        </div>
        <div class="theme-box blue">
            <span>Blue</span>
            <label class="toggle">
                <input type="radio" name="theme" data-color="#dbeafe">
                <span class="slider"></span>
            </label>
        </div>
        <div class="theme-box red">
            <span>Red</span>
            <label class="toggle">
                <input type="radio" name="theme" data-color="#fee2e2">
                <span class="slider"></span>
            </label>
        </div>
    </div>

</body>
<script src="./script.js"></script>

</html>
